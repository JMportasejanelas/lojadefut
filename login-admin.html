<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - Ginga7</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d4f2c, #1a1a1a);
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        
        .login-logo {
            margin-bottom: 2rem;
        }
        
        .login-logo img {
            height: 60px;
            margin-bottom: 1rem;
        }
        
        .login-title {
            color: #0d4f2c;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        .login-subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #0d4f2c;
            box-shadow: 0 0 0 3px rgba(13, 79, 44, 0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #0d4f2c, #1a1a1a);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(13, 79, 44, 0.3);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px solid #f5c6cb;
            display: none;
        }
        
        .security-info {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #ecf0f1;
        }
        
        .security-info h4 {
            color: #0d4f2c;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        
        .security-info p {
            color: #666;
            font-size: 0.8rem;
            line-height: 1.4;
        }
        
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            color: #27ae60;
        }
        
        @media (max-width: 768px) {
            .login-card {
                padding: 2rem;
            }
            
            .login-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Voltar para Loja
    </a>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="logo.png" alt="Ginga7">
                <h1 class="login-title">Acesso Administrativo</h1>
                <p class="login-subtitle">Digite suas credenciais para acessar o painel</p>
            </div>
            
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="errorText">Usuário ou senha incorretos</span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">
                        <i class="fas fa-user"></i> Usuário
                    </label>
                    <input type="text" id="username" class="form-input" placeholder="Digite seu usuário" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock"></i> Senha
                    </label>
                    <input type="password" id="password" class="form-input" placeholder="Digite sua senha" required>
                </div>
                
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>
            
            <div class="security-info">
                <h4><i class="fas fa-shield-alt"></i> Informações de Segurança</h4>
                <p>
                    Esta área é restrita a administradores. Use as credenciais fornecidas pelo responsável pelo sistema. 
                    Tentativas de acesso não autorizadas são registradas.
                </p>
            </div>
        </div>
    </div>

    <script>
        // Default credentials (CHANGE IN PRODUCTION!)
        const ADMIN_CREDENTIALS = {
            username: 'admin',
            password: 'ginga7@2024'
        };

        // Check if already logged in
        function checkAuth() {
            const isLoggedIn = sessionStorage.getItem('ginga7_admin_logged_in');
            if (isLoggedIn === 'true') {
                window.location.href = 'admin.html';
                return true;
            }
            return false;
        }

        // Login function
        function login(username, password) {
            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                sessionStorage.setItem('ginga7_admin_logged_in', 'true');
                sessionStorage.setItem('ginga7_admin_login_time', new Date().toISOString());
                
                // Log successful login
                logLoginAttempt(username, true);
                
                showNotification('Login realizado com sucesso!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
                
                return true;
            } else {
                // Log failed login
                logLoginAttempt(username, false);
                
                showError('Usuário ou senha incorretos');
                return false;
            }
        }

        // Log login attempts
        function logLoginAttempt(username, success) {
            const logs = JSON.parse(localStorage.getItem('ginga7_login_logs') || '[]');
            logs.push({
                username: username,
                success: success,
                timestamp: new Date().toISOString(),
                ip: 'N/A', // In production, get real IP
                userAgent: navigator.userAgent
            });
            
            // Keep only last 100 logs
            if (logs.length > 100) {
                logs.shift();
            }
            
            localStorage.setItem('ginga7_login_logs', JSON.stringify(logs));
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            errorText.textContent = message;
            errorDiv.style.display = 'block';
            
            // Shake animation
            const form = document.getElementById('loginForm');
            form.style.animation = 'shake 0.5s';
            
            setTimeout(() => {
                form.style.animation = '';
            }, 500);
        }

        // Hide error message
        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#27ae60' : '#e74c3c'};
                color: white;
                padding: 15px 20px;
                border-radius: 10px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.2);
                z-index: 10000;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            hideError();
            login(username, password);
        });

        // Hide error when typing
        document.getElementById('username').addEventListener('input', hideError);
        document.getElementById('password').addEventListener('input', hideError);

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
            
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Check auth on page load
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
        });

        // Auto-logout after 30 minutes of inactivity
        let inactivityTimer;
        
        function resetTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                sessionStorage.removeItem('ginga7_admin_logged_in');
                sessionStorage.removeItem('ginga7_admin_login_time');
                window.location.href = 'login-admin.html';
            }, 30 * 60 * 1000); // 30 minutes
        }

        // Reset timer on user activity
        document.addEventListener('mousemove', resetTimer);
        document.addEventListener('keypress', resetTimer);
        document.addEventListener('click', resetTimer);
        document.addEventListener('scroll', resetTimer);
    </script>
</body>
</html>
